version: '3.7'

services:
  mtproto-proxy:
    # Официальный образ: внутри всегда порт 443, снаружи — через ports (см. Docker Hub telegrammessenger/proxy)
    image: telegrammessenger/proxy:latest
    container_name: mtproto-proxy
    restart: always
    ports:
      - "${PROXY_PORT:-443}:443"
    environment:
      - SECRET=${SECRET}
      - WORKERS=1
    volumes:
      - ./proxy-data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
